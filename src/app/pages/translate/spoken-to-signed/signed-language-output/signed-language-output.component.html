@for (poseUrl of [pose$ | async]; track poseUrl) {
  @if (poseUrl) {
    @switch (poseViewerSetting$ | async) {
      @case ('avatar') {
        <app-avatar-pose-viewer [src]="poseUrl" />
      }
      @case ('person') {
        <app-human-pose-viewer [src]="poseUrl" />
      }
      @default {
        <!-- Default skeleton viewer -->
        <app-skeleton-pose-viewer [src]="poseUrl" />
      }
    }
  } @else if (videoUrl) {
    <video
      [src]="safeVideoUrl"
      autoplay
      loop
      muted
      playsinline
      height="100%"
      width="100%"
      (error)="onVideoError($event)"
      (loadedmetadata)="onVideoLoadedMetadata($event)"
      (timeupdate)="onVideoTimeUpdate($event)"
      (click)="playVideoIfPaused($event)"></video>
  }
}

<app-smart-tips class="desktop-only-tips"></app-smart-tips>

@if (pose$ | async; as pose) {
  <div class="actions-row">
    @if (videoUrl) {
      <ion-button
        class="action-button"
        fill="solid"
        shape="round"
        color="primary"
        (click)="downloadTranslation()"
        [attr.aria-label]="'translate.spoken-to-signed.actions.download' | transloco"
        [matTooltip]="'translate.spoken-to-signed.actions.download' | transloco"
        [matTooltipPosition]="'above'">
        <ion-icon name="download-outline" slot="icon-only" />
      </ion-button>
      @if (isSharingSupported) {
        <ion-button
          class="action-button"
          fill="solid"
          shape="round"
          color="primary"
          (click)="shareTranslation()"
          [attr.aria-label]="'translate.spoken-to-signed.actions.share' | transloco"
          [matTooltip]="'translate.spoken-to-signed.actions.share' | transloco"
          [matTooltipPosition]="'above'">
          <ion-icon ios="share-outline" md="share-social-outline" slot="icon-only" />
        </ion-button>
      }
    } @else {
      <ion-button [disabled]="true" class="action-button" fill="solid" shape="round">
        <ion-spinner name="crescent"></ion-spinner>
      </ion-button>
    }
  </div>
  <app-viewer-selector></app-viewer-selector>
}
