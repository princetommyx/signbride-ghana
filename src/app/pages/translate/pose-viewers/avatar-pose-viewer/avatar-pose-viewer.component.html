<app-animation [fps]="effectiveFps"></app-animation>

<ng-container *ngIf="poseViewerSupported; else poseViewerUnavailable">
  <pose-viewer
    class="pose-viewer"
    #poseViewer
    [src]="src"
    [autoplay]="true"
    [loop]="false"
    [background]="background"
    [width]="'100%'"
    [height]="'100%'"></pose-viewer>
</ng-container>

<ng-template #poseViewerUnavailable>
  <div class="pose-viewer-fallback" role="alert" aria-live="polite">
    Avatar rendering is unavailable in this environment. The translation is still available via the video and controls.
  </div>
</ng-template>
